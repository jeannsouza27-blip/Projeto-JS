<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conversor de Moedas</title>
  <link rel="stylesheet" href="./styler.css">
</head>

<body>

  <img class="logo" src="./assets/docc81lar-real-20151001-0081.jpg" alt="logo">

  <main>
    <label>
      Converter de
      <select id="currency-from">
        <option value="real">R$ Real Brasileiro</option>
        <option value="dolar">US$ Dólar Americano</option>
        <option value="euro">€ Euro</option>
        <option value="libra">£ Libra</option>
        <option value="bitcoin">Biticoin</option>

      </select>
    </label>

    <label>
      Converter para
      <select id="currency-select">
        <option value="dolar">US$ Dólar Americano</option>
        <option value="euro">€ Euro</option>
        <option value="libra">£ Libra</option>
        <option value="bitcoin">Biticoin</option>
        <option value="real">R$ Real Brasileiro</option>

      </select>
    </label>

    <label>
      Valor
      <input id="input-currency" type="number" placeholder="1000">
    </label>

    <button id="convert-button">Converter</button>

    <section>


      <img id="currency-img-from" src="./assets/brasil.jpg" alt="moeda">
      <p id="currency-name-from">Real Brasileiro</p>
      <p id="currency-value">R$ 0,00</p>

      <img class="seta" src="./assets/Vector.jpg" alt="seta">

      <img id="currency-img" src="./assets/dolar.png" alt="moeda">
      <p id="currency-name">Dólar Americano</p>
      <p id="currency-value-converted">US$ 0.00</p>






    </section>


  </main>

  <script src="./scripit.js"></script>
</body>

</html>
