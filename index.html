<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conversor de Moedas</title>
  <link rel="stylesheet" href="./styler.css">
</head>

<body>

  <img class="logo" src="./assets/docc81lar-real-20151001-0081.jpg" alt="logo">

  <main>
    <label>
      Converter de
      <select>
        <option>R$ Real Brasileiro</option>
      </select>
    </label>

    <label>
      Converter para
      <select id="currency-select">
        <option value="dolar">US$ Dólar Americano</option>
        <option value="euro">€ Euro</option>
        <option value="libra">£ Libra</option>
        <option value="peso">Peso Argentino</option>
      </select>
    </label>

    <label>
      Valor
      <input id="input-currency" type="number" placeholder="1000">
    </label>

    <button id="convert-button">Converter</button>

    <section>
      
      
      <img src="./assets/brasil.jpg">
      <p id="currency-value">R$ 0,00</p>

      <img class="seta" src="./assets/Vector.jpg">
      
      <img src="./assets/estados-unidos .png">
      <p id="currency-value-converted">$ 0.00</p>
    </section>
  </main>

  <script src="./scripit.js"></script>
</body>

</html>
